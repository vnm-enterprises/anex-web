name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root_secure_password
          MYSQL_DATABASE: anexlk
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot_secure_password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      NODE_ENV: test
      DATABASE_URL: mysql://root:root_secure_password@127.0.0.1:3306/anexlk
      JWT_SECRET: 12345678901234567890123456789012
      JWT_EXPIRES_IN: 7d
      GOOGLE_CLIENT_ID: test-client-id
      SESSION_COOKIE_NAME: annex_access
      CSRF_COOKIE_NAME: annex_csrf
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      REDIS_URL: redis://127.0.0.1:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm prisma:generate

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Unit + integration tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Docker build
        run: docker build -t annexlk/app:ci .

      # Optional push step:
      # - name: Login to registry
      #   run: echo "$REGISTRY_TOKEN" | docker login -u "$REGISTRY_USER" --password-stdin
      # - name: Push image
      #   run: docker push annexlk/app:ci
